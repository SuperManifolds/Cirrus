name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sign-notarize:
    name: Build, Sign & Notarize
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      # ── Certificate & Profile Setup ──────────────────────────────

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH

          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

          rm $CERTIFICATE_PATH

      - name: Install provisioning profile
        env:
          APP_PROFILE_BASE64: ${{ secrets.CIRRUS_APP_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/Cirrus_DeveloperID.provisionprofile

      # ── Build ────────────────────────────────────────────────────

      - name: Resolve packages
        run: |
          xcodebuild -project Cirrus.xcodeproj \
            -scheme Cirrus \
            -resolvePackageDependencies

      - name: Archive
        run: |
          xcodebuild archive \
            -project Cirrus.xcodeproj \
            -scheme Cirrus \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/Cirrus.xcarchive \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── Sign ─────────────────────────────────────────────────────

      - name: Export and sign app
        run: |
          APP_PATH=$RUNNER_TEMP/export/Cirrus.app
          mkdir -p $RUNNER_TEMP/export
          cp -R "$RUNNER_TEMP/Cirrus.xcarchive/Products/Applications/Cirrus.app" "$APP_PATH"

          # Embed provisioning profile
          cp ~/Library/MobileDevice/Provisioning\ Profiles/Cirrus_DeveloperID.provisionprofile \
            "$APP_PATH/Contents/embedded.provisionprofile"

          xattr -cr "$APP_PATH"

          # Sign frameworks if present
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" \
              \( -name "*.app" -o -name "*.dylib" -o -name "*.xpc" -o -type f -perm +111 \) \
              -not -path "*/Headers/*" -not -path "*/Modules/*" -not -name "*.h" \
              | sort -r | while read f; do
              file "$f" | grep -q "Mach-O" || continue
              codesign --force --options runtime --timestamp \
                --sign "Developer ID Application" "$f"
            done

            find "$APP_PATH/Contents/Frameworks" -name "*.framework" -maxdepth 1 | while read f; do
              codesign --force --options runtime --timestamp \
                --sign "Developer ID Application" "$f"
            done
          fi

          # Sign the main app
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" \
            "$APP_PATH"

          # Verify
          codesign -vvv --deep --strict "$APP_PATH"

      # ── Package ──────────────────────────────────────────────────

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Cirrus" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Cirrus.app" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            $RUNNER_TEMP/Cirrus.dmg \
            $RUNNER_TEMP/export/Cirrus.app || true

          codesign --force --sign "Developer ID Application" $RUNNER_TEMP/Cirrus.dmg

      # ── Notarize ─────────────────────────────────────────────────

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

          SUBMIT_OUTPUT=$(xcrun notarytool submit $RUNNER_TEMP/Cirrus.dmg \
            --keychain-profile "notarytool-profile" \
            --wait \
            --timeout 30m 2>&1) || true
          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --keychain-profile "notarytool-profile" 2>&1
            exit 1
          fi

          xcrun stapler staple $RUNNER_TEMP/Cirrus.dmg
          xcrun stapler validate $RUNNER_TEMP/Cirrus.dmg

      # ── Sparkle Signing ─────────────────────────────────────────

      - name: Sign DMG with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          SPARKLE_VERSION="2.9.1"
          mkdir -p /tmp/sparkle
          gh release download "$SPARKLE_VERSION" \
            --repo sparkle-project/Sparkle \
            --pattern "Sparkle-${SPARKLE_VERSION}.tar.xz" \
            --dir /tmp
          tar xJf /tmp/Sparkle-${SPARKLE_VERSION}.tar.xz -C /tmp/sparkle
          echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          SIG_OUTPUT=$(/tmp/sparkle/bin/sign_update "$RUNNER_TEMP/Cirrus.dmg" --ed-key-file "$RUNNER_TEMP/sparkle_key" 2>&1)
          rm -f "$RUNNER_TEMP/sparkle_key"
          SPARKLE_ED_SIG=$(echo "$SIG_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          DMG_LENGTH=$(echo "$SIG_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          echo "SPARKLE_ED_SIG=$SPARKLE_ED_SIG" >> $GITHUB_ENV
          echo "DMG_LENGTH=$DMG_LENGTH" >> $GITHUB_ENV

      # ── Release ──────────────────────────────────────────────────

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/Cirrus.dmg
          name: Cirrus ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cleanup ──────────────────────────────────────────────────

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
